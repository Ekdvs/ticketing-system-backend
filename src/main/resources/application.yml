spring:
  application:
    name: ticket-booking-backend
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${USER_EMAIL}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

  data:
    mongodb:
      uri: ${MONGO_URI}
      write-concern: ACKNOWLEDGED

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

payhere:
  merchant:
    id: ${MERCHANT_ID}
    secret: ${MERCHANT_SECRET}

dotenv:
  ignoreIfMissing: false

qr:
  secret: ${QR_SECRET}

logging:
  level:
    org.springframework.data.mongodb: INFO